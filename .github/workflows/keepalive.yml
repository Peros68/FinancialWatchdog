name: Keep Render awake (market hours)

on:
  schedule:
    # Ogni 10 min, Lun-Ven, 07:00–21:50 UTC.
    # Copre Borsa Italiana (09:00–17:30 Europe/Rome) e NYSE/Nasdaq
    # (15:30–22:00 Europe/Rome) in entrambi i regimi CET/CEST ed EST/EDT.
    # Il cron di GitHub Actions è solo UTC e non gestisce il DST.
    - cron: "*/10 7-21 * * 1-5"
  workflow_dispatch: {} # trigger manuale per test

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /api/health
        run: |
          if [ -z "${{ vars.RENDER_HEALTH_URL }}" ]; then
            echo "::error::Repository variable RENDER_HEALTH_URL non configurata"
            exit 1
          fi
          curl --fail --silent --show-error --max-time 60 \
               --retry 3 --retry-delay 20 --retry-all-errors \
               "${{ vars.RENDER_HEALTH_URL }}"
